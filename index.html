<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Juego de Eva K-POP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;700;900&family=Syne:wght@800&display=swap');
        * { box-sizing: border-box; }
        :root {
            --historia-banner: url("data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAkGBwgHBgkIBwgKCgkLDRYPDQwMDRsUFRAWIB0iIiAdHx8kKDQsJCYxJx8fLT0tMTU3Ojo6Iys/RD84QzQ5Ojf/2wBDAQoKCg0MDRoPDxo3JR8lNzc3Nzc...");
        }
        body {
            font-family: 'Archivo', sans-serif;
            background: #0a0006;
            color: #fff;
            margin: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .font-arch { font-family: 'Archivo Black', sans-serif; }
        .marquee-wrap {
            background: linear-gradient(90deg, #ff007a 0%, #7000ff 100%);
            overflow: hidden;
            white-space: nowrap;
            padding: 8px 0;
            border-bottom: 2px solid #fff;
        }
        .marquee-text {
            display: inline-block;
            font-family: 'Syne', sans-serif;
            font-size: 1.2rem;
            text-transform: uppercase;
            animation: marquee 20s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .card-glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
        }
        .neon-pink { text-shadow: 0 0 10px #ff007a, 0 0 20px #ff007a; }
        .neon-border-pink { border: 2px solid #ff007a; box-shadow: 0 0 10px #ff007a; }
        .btn-grad {
            background: linear-gradient(45deg, #ff007a, #7000ff);
            transition: all 0.3s ease;
        }
        .btn-grad:active { transform: scale(0.95); opacity: 0.9; }
        .sync-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 4px;
            font-size: 0.7rem;
            text-align: center;
            z-index: 100;
        }
        .sb-ok { background: #00ff88; color: #000; }
        .sb-err { background: #ff0055; color: #fff; }
        .sb-load { background: #ffaa00; color: #000; }
        input[type="checkbox"] {
            width: 28px;
            height: 28px;
            accent-color: #ff007a;
        }
        .done-card { opacity: 0.6; filter: grayscale(0.5); border-color: transparent !important; }
    </style>
</head>
<body>

<div class="marquee-wrap">
    <div class="marquee-text">
        EVA K-POP WORLD TOUR 2024 • LIVE YOUR DREAMS • SHINE LIKE A STAR • EVA K-POP WORLD TOUR 2024
    </div>
</div>

<div class="max-w-md mx-auto p-4 pb-20">
    <header class="text-center mb-6 pt-4">
        <h1 class="font-arch text-4xl mb-1 italic tracking-tighter neon-pink">EVA TOUR</h1>
        <p class="text-xs tracking-[0.3em] uppercase opacity-70">Official Achievement Tracker</p>
    </header>

    <div class="grid grid-cols-2 gap-3 mb-6">
        <div class="card-glass p-4 text-center border-l-4 border-pink-500">
            <p class="text-[0.6rem] uppercase tracking-widest opacity-60 mb-1">Total Points</p>
            <div id="score-total" class="font-arch text-3xl">0</div>
        </div>
        <div class="card-glass p-4 text-center border-l-4 border-purple-500">
            <p class="text-[0.6rem] uppercase tracking-widest opacity-60 mb-1">Month Progress</p>
            <div id="score-monthly" class="font-arch text-3xl">0</div>
        </div>
        <div class="col-span-2 card-glass p-3 flex justify-between items-center px-6">
            <span class="text-xs uppercase tracking-widest opacity-60">Weekly Points:</span>
            <span id="score-weekly" class="font-arch text-xl text-pink-500">0</span>
        </div>
    </div>

    <div id="tasks-container" class="space-y-3"></div>

    <div class="mt-8 space-y-3">
        <button onclick="App.showAdmin()" class="w-full py-4 rounded-xl font-bold bg-white/10 border border-white/20 text-sm tracking-widest uppercase">
            ⚙️ Configuración Tour
        </button>
    </div>
</div>

<div id="sync-status" class="sync-bar sb-load">⏳ Iniciando tour...</div>

<div id="modal-admin" class="fixed inset-0 bg-black/90 z-[200] hidden p-6 overflow-y-auto">
    <div class="flex justify-between items-center mb-6">
        <h2 class="font-arch text-2xl">ADMIN TOUR</h2>
        <button onclick="App.hideAdmin()" class="text-3xl">&times;</button>
    </div>

    <div class="space-y-6">
        <div class="bg-white/5 p-4 rounded-xl border border-white/10">
            <h3 class="text-xs uppercase tracking-widest mb-4 text-pink-500 font-bold">Nueva Actividad</h3>
            <input id="new-task-name" type="text" placeholder="Nombre (ej: Practicar Coreo)" class="w-full bg-black/50 border border-white/20 p-3 rounded-lg mb-3 text-sm">
            <input id="new-task-val" type="number" placeholder="Puntos (ej: 10)" class="w-full bg-black/50 border border-white/20 p-3 rounded-lg mb-3 text-sm">
            <button onclick="App.addTask()" class="w-full btn-grad py-3 rounded-lg font-bold text-xs uppercase">Añadir al Setlist</button>
        </div>

        <div id="admin-tasks-list" class="space-y-2"></div>
        
        <div class="pt-6 border-t border-white/10 space-y-3">
            <p class="text-[10px] uppercase opacity-50 text-center">Resets Manuales (Peligro)</p>
            <button onclick="App.manualReset('weekly')" class="w-full py-2 bg-red-900/20 text-red-400 text-[10px] rounded uppercase font-bold">Reset Semanal Manual</button>
            <button onclick="App.manualReset('monthly')" class="w-full py-2 bg-red-900/20 text-red-400 text-[10px] rounded uppercase font-bold">Reset Mensual Manual</button>
        </div>
    </div>
</div>

<div id="toast" class="fixed top-10 left-1/2 -translate-x-1/2 bg-white text-black px-6 py-3 rounded-full font-bold shadow-2xl z-[300] hidden transition-all duration-300"></div>

<script>
// --- CONFIGURACIÓN ---
const firebaseConfig = {
    apiKey: "AIzaSyBE3mn9a-hgJjr3zRI_fftNfI4jfrC1lQc", // API KEY CORREGIDA
    authDomain: "eva-kpop-tour.firebaseapp.com",
    projectId: "eva-kpop-tour",
    storageBucket: "eva-kpop-tour.firebasestorage.app",
    messagingSenderId: "49327968177",
    appId: "1:49327968177:web:96ed05e9f0854e893c7790",
    measurementId: "G-038YDW4PQS"
};

const emptyData = () => ({
    score: 0,
    scoreWeekly: 0,
    scoreMonthly: 0,
    lastResetDate: '',
    lastMonth: new Date().getMonth(),
    activities: [
        { id: 1, name: "Hacer la cama", pts: 10, done: false },
        { id: 2, name: "Recoger juguetes", pts: 15, done: false }
    ],
    lastSyncMs: 0
});

// --- CORE APP ---
const App = {
    d: emptyData(),
    db: null,
    user: null,
    _skipSnap: false,

    async init() {
        this.loadLocal();
        this.render();
        
        try {
            firebase.initializeApp(firebaseConfig);
            this.db = firebase.firestore();
            const res = await firebase.auth().signInAnonymously();
            this.user = res.user;
            this.sync();
        } catch(e) {
            console.error(e);
            this.status('sb-err', '❌ Error de Conexión');
        }
    },

    loadLocal() {
        const local = localStorage.getItem('eva_kpop_data');
        if(local) this.d = JSON.parse(local);
        this._checkResets();
    },

    save() {
        this.d.lastSyncMs = Date.now();
        localStorage.setItem('eva_kpop_data', JSON.stringify(this.d));
        this.render();
        this.push();
    },

    _checkResets() {
        const ahora = new Date();
        const todayStr = ahora.toISOString().split('T')[0];
        const currentMonth = ahora.getMonth();

        let changed = false;

        // 1. RESET DIARIO (Tareas)
        if(this.d.lastResetDate !== todayStr) {
            this.d.activities.forEach(a => a.done = false);
            this.d.lastResetDate = todayStr;
            changed = true;
        }

        // 2. RESET MENSUAL (Semanal y Mensual a cero cada día 1)
        if(this.d.lastMonth === undefined) this.d.lastMonth = currentMonth;
        
        if(this.d.lastMonth !== currentMonth) {
            this.d.scoreWeekly = 0;   
            this.d.scoreMonthly = 0;
            this.d.lastMonth = currentMonth;
            changed = true;
            this.showToast("🌟 ¡Nuevo Mes!", "Los contadores han iniciado de cero.");
        }

        if(changed) {
            localStorage.setItem('eva_kpop_data', JSON.stringify(this.d));
            this.render();
        }
    },

    render() {
        document.getElementById('score-total').innerText = this.d.score;
        document.getElementById('score-weekly').innerText = this.d.scoreWeekly;
        document.getElementById('score-monthly').innerText = this.d.scoreMonthly;

        const container = document.getElementById('tasks-container');
        container.innerHTML = '';

        this.d.activities.forEach((a, idx) => {
            const div = document.createElement('div');
            div.className = `card-glass p-4 flex items-center justify-between transition-all ${a.done ? 'done-card' : 'border-l-4 border-pink-500'}`;
            div.innerHTML = `
                <div onclick="App.toggle(${idx})" class="flex-1 cursor-pointer">
                    <p class="font-bold text-lg">${a.name}</p>
                    <p class="text-[10px] uppercase tracking-widest text-pink-400">+${a.pts} points</p>
                </div>
                <input type="checkbox" ${a.done ? 'checked' : ''} onchange="App.toggle(${idx})">
            `;
            container.appendChild(div);
        });
    },

    toggle(idx) {
        const a = this.d.activities[idx];
        a.done = !a.done;
        
        const val = parseInt(a.pts);
        if(a.done) {
            this.d.score += val;
            this.d.scoreWeekly += val;
            this.d.scoreMonthly += val;
            this.showToast("✨ +" + val + " pts", a.name);
        } else {
            this.d.score -= val;
            this.d.scoreWeekly -= val;
            this.d.scoreMonthly -= val;
        }
        this.save();
    },

    // --- FIREBASE SYNC ---
    async push() {
        if(!this.db || !this.user) return;
        this.status('sb-load', '☁️ Guardando en la nube...');
        try {
            this._skipSnap = true;
            await this.db.collection('users').doc(this.user.uid).set(this.d);
            this.status('sb-ok', '☁️ Sincronizado');
        } catch(e) {
            this.status('sb-err', '❌ Error al sincronizar');
        }
    },

    sync() {
        const ref = this.db.collection('users').doc(this.user.uid);
        ref.onSnapshot(doc => {
            if(this._skipSnap) { this._skipSnap = false; return; }
            if(doc.exists) {
                const cloud = doc.data();
                if(cloud.lastSyncMs > (this.d.lastSyncMs || 0)) {
                    this.d = cloud;
                    this._checkResets();
                    localStorage.setItem('eva_kpop_data', JSON.stringify(this.d));
                    this.render();
                    this.status('sb-ok', '☁️ Sincronizado');
                }
            }
        });
    },

    status(clase, texto) {
        const b = document.getElementById('sync-status');
        b.className = 'sync-bar ' + clase;
        b.innerText = texto;
    },

    showToast(title, sub) {
        const t = document.getElementById('toast');
        t.innerHTML = `<div>${title}</div><div class="text-[10px] opacity-60 uppercase font-normal">${sub}</div>`;
        t.classList.remove('hidden');
        setTimeout(() => t.classList.add('hidden'), 2500);
    },

    // --- ADMIN ---
    showAdmin() {
        this.renderAdminList();
        document.getElementById('modal-admin').classList.remove('hidden');
    },
    hideAdmin() { document.getElementById('modal-admin').classList.add('hidden'); },
    
    renderAdminList() {
        const list = document.getElementById('admin-tasks-list');
        list.innerHTML = '';
        this.d.activities.forEach((a, i) => {
            const d = document.createElement('div');
            d.className = "flex justify-between items-center bg-white/5 p-2 rounded text-xs";
            d.innerHTML = `<span>${a.name} (${a.pts})</span> 
                           <button onclick="App.deleteTask(${i})" class="text-red-500 font-bold px-2">Eliminar</button>`;
            list.appendChild(d);
        });
    },

    addTask() {
        const name = document.getElementById('new-task-name').value;
        const pts = document.getElementById('new-task-val').value;
        if(!name || !pts) return;
        this.d.activities.push({ id: Date.now(), name, pts: parseInt(pts), done: false });
        document.getElementById('new-task-name').value = '';
        document.getElementById('new-task-val').value = '';
        this.save();
        this.renderAdminList();
    },

    deleteTask(i) {
        this.d.activities.splice(i, 1);
        this.save();
        this.renderAdminList();
    },

    manualReset(type) {
        if(!confirm('¿Estás seguro de reiniciar los puntos?')) return;
        if(type === 'weekly') this.d.scoreWeekly = 0;
        if(type === 'monthly') this.d.scoreMonthly = 0;
        this.save();
        this.showToast("♻️ Reiniciado", type);
    }
};

document.addEventListener('DOMContentLoaded', () => App.init());
</script>
</body>
</html>
